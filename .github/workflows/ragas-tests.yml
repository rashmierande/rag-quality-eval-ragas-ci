name: RAGAS Quality Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ragas-evaluation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install and start Ollama
      run: |
        # Install Ollama
        curl -fsSL https://ollama.com/install.sh | bash

        # Start Ollama server in background
        ollama serve &
        
        # Give it a moment to start
        sleep 20
        curl --retry 5 --retry-all-errors --retry-delay 5 http://localhost:11434/api/tags 

        # Load the model you use
        #ollama pull ${{ secrets.OLLAMA_MODEL || 'llama3' }}
        #ollama pull llama3
        ollama pull qwen2.5:1.5b-instruct
        ollama pull ${{ secrets.OLLAMA_EMBED_MODEL || 'nomic-embed-text' }}

    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          tests/requirements.txt
    
    - name: Install dependencies
      run: |
        pip install ragas langchain openai pandas datasets langchain-ollama
        pip install -r requirements.txt
    
    - name: Run RAGAS tests
      env:
        # provider + models (Ollama default, OpenAI optional)
        # LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'ollama' }}
        # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
        # OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL || 'llama3' }}
        LLM_PROVIDER: ollama
        #OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL || 'llama3' }}
        OLLAMA_MODEL: qwen2.5:1.5b-instruct   # example tiny model
        OLLAMA_EMBED_MODEL: ${{ secrets.OLLAMA_EMBED_MODEL || 'nomic-embed-text' }}
      run: |
        python tests/ragas_test.py
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ragas-results
        path: test_results.json
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('test_results.json', 'utf8'));

          const safeScore = (value) => {
            if (typeof value !== 'number') return 'N/A';
            return value.toFixed(2);
            };

          const getStatus = (score, threshold) => {
            if (typeof score !== 'number') return '⚠️';
            return score >= threshold ? '✅' : '❌';
          };

          const metrics = [
            { key: 'faithfulness',       label: 'Faithfulness',       threshold: 0.7 },
            { key: 'answer_relevancy',   label: 'Answer Relevancy',   threshold: 0.4 },
            { key: 'context_precision',  label: 'Context Precision',  threshold: 0.4 },
            { key: 'context_recall',     label: 'Context Recall',     threshold: 0.7 },
          ];

          const lines = [];
          lines.push('## RAGAS Test Results');
          lines.push('');
          lines.push('| Metric | Score | Threshold | Status |');
          lines.push('|--------|-------|-----------|--------|');

          for (const m of metrics) {
            const score = results[m.key];
            lines.push(`| ${m.label} | ${safeScore(score)} | ${m.threshold} | ${getStatus(score, m.threshold)} |`);
          }

          lines.push('');
          if (results.all_passed) {
            lines.push('✅ **All tests passed!** Safe to merge.');
          } else {
            lines.push('❌ **Some tests failed.** Please review and fix before merging.');
          }

          const comment = lines.join('\n');

          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment,
          });